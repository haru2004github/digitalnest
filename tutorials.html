<!DOCTYPE html>
<html lang="my" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Nest - Video Tutorials</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Theme Check -->
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' },
                        tech: { dark: '#0B1120', light: '#F8FAFC' }
                    },
                    animation: {
                        'toast-slide': 'toastSlide 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.5s ease-out forwards'
                    },
                    keyframes: {
                        toastSlide: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        .glass-nav { background: rgba(248, 250, 252, 0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .dark .glass-nav { background: rgba(11, 17, 32, 0.92); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .bg-grid-pattern { background-image: linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px); background-size: 30px 30px; mask-image: linear-gradient(to bottom, transparent, black, transparent); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        #scrollToTopBtn { opacity: 0; pointer-events: none; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #scrollToTopBtn.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .minimal-card { background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(0, 0, 0, 0.05); transition: all 0.3s ease; overflow: hidden; }
        .dark .minimal-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .minimal-card:hover { border-color: #06b6d4; transform: translateY(-3px); box-shadow: 0 10px 20px -10px rgba(6, 182, 212, 0.2); }
    </style>
</head>
<body class="min-h-screen bg-tech-light text-slate-900 dark:bg-tech-dark dark:text-slate-50 font-sans selection:bg-cyan-500 selection:text-white overflow-x-hidden transition-colors duration-300 relative w-full flex flex-col">

    <div class="fixed inset-0 bg-grid-pattern pointer-events-none z-0"></div>
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 py-3 md:py-4 border-b border-transparent">
        <div class="container mx-auto px-5 md:px-6 flex justify-between items-center relative z-20">
            <!-- Logo -->
            <div class="flex items-center gap-2 cursor-pointer active:scale-95 transition-transform" onclick="window.scrollTo(0,0)">
                <div class="w-8 h-8 md:w-9 md:h-9 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-md shadow-cyan-500/20">
                    <img class="rounded-xl" src="./img/dnlogo.png" alt="">
                </div>
                <span class="text-lg md:text-xl font-display font-bold tracking-tight text-slate-900 dark:text-white">DIGITAL<span class="text-cyan-600 dark:text-cyan-400">NEST</span></span>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden lg:flex items-center gap-6 text-xs font-semibold uppercase tracking-widest text-slate-600 dark:text-slate-300">
                <a href="./index.html" data-i18n="navHome" class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">Home</a>
                <a href=".about.html" data-i18n="navAbout" class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">About</a>
                <a href="#shop" data-i18n="navShop" class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">Shop</a>
                <a href="#offers" data-i18n="navOffers" class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">Offers</a>
                <a href="#reviews" data-i18n="navReviews" class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">Reviews</a>
                <a href="./blog.html"  class="hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors">Blog</a>
                
                <div class="flex items-center gap-4 border-l border-slate-300 dark:border-white/10 pl-6">
                    <!-- Theme Toggle -->
                    <button class="theme-toggle hover:text-cyan-500 transition-colors p-1" aria-label="Toggle Dark Mode">
                        <svg class="sun-icon hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                        <svg class="moon-icon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <!-- Lang Toggle -->
                    <button id="langToggleBtn" class="hover:text-cyan-500 transition-colors font-bold px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded-md active:scale-95">EN</button>
                    <!-- Buy Button -->
                    <a href="#contact" data-i18n="navContact" class="px-5 py-2 rounded-full bg-slate-900 text-white dark:bg-cyan-500 dark:text-white hover:scale-105 active:scale-95 transition-all text-xs">ဝယ်ယူရန်</a>
                </div>
            </div>

            <!-- Mobile Actions & Toggle Button -->
            <div class="flex items-center gap-3 lg:hidden relative z-20">
                <!-- Theme Toggle (Mobile) -->
                <button class="theme-toggle text-slate-500 hover:text-cyan-500 transition-colors p-1.5 active:scale-90" aria-label="Toggle Dark Mode">
                    <svg class="sun-icon hidden w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
                    <svg class="moon-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                
                <!-- Lang Toggle (Mobile) -->
                <button id="langToggleBtnMobile" class="text-[10px] font-bold text-slate-700 dark:text-slate-300 bg-slate-200 dark:bg-slate-800 px-2 py-1.5 rounded-md active:scale-90 transition-transform">EN</button>
                
                <!-- Hamburger Menu Button -->
                <button id="mobileMenuBtn" class="text-slate-600 dark:text-slate-300 focus:outline-none p-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg active:scale-90 transition-transform">
                    <svg id="menuIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                    <svg id="closeIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Dropdown -->
        <div id="mobileMenu" class="bg-white dark:bg-slate-900 absolute top-full left-0 w-full glass-nav shadow-2xl origin-top lg:hidden border-b border-slate-200 dark:border-white/10">
            <div class="px-5 py-4 flex flex-col gap-1">
                <a href="./index.html" data-i18n="navHome" class="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">Home</a>
                <a href=".about.html" data-i18n="navAbout" class="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">About Us</a>
                <a href="#shop" data-i18n="navShop" class="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">Shop</a>
                <a href="#offers" data-i18n="navOffers" class="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">Offers</a>
                <a href="#reviews" data-i18n="navReviews" class="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">Reviews</a>

                 <a href="./blog.html" lass="mobile-link text-sm font-semibold text-slate-800 dark:text-slate-200 hover:text-cyan-500 transition-colors p-3 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800/50 active:bg-slate-200 dark:active:bg-slate-800">Blog</a>
                
                <div class="mt-3 pt-4 border-t border-slate-200 dark:border-white/10">
                    <a href="#contact" data-i18n="navContact" class="mobile-link w-full py-3.5 text-center rounded-xl bg-cyan-600 dark:bg-cyan-500 font-bold text-white text-sm active:scale-[0.98] transition-transform shadow-lg shadow-cyan-500/20 block">ဝယ်ယူရန်</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Header -->
    <main class="flex-grow pt-24 pb-20 relative z-10 w-full">
        <div class="container mx-auto px-5 animate-fade-in">
            <div class="mb-10 text-center">
                <p data-i18n="tutorialSubtitle" class="text-[10px] font-bold tracking-[0.2em] text-red-500 uppercase mb-2">Tutorials</p>
                <h1 data-i18n="tutorialTitle" class="text-3xl font-display font-bold text-slate-900 dark:text-white leading-tight">Video Collection</h1>
                <p data-i18n="tutorialDesc" class="text-[13px] text-slate-600 dark:text-slate-400 max-w-sm mx-auto mt-2 leading-relaxed">နည်းပညာဆိုင်ရာ လမ်းညွှန်များကို တစ်နေရာတည်းမှာ စုစည်းပေးထားပါတယ်။</p>
            </div>

            <!-- Categories -->
            <div class="mb-10 hidden" id="categorySection">
                <div class="overflow-x-auto hide-scrollbar -mx-5 px-5">
                    <div id="categoryContainer" class="flex gap-2 pb-3 w-max"></div>
                </div>
            </div>

            <!-- Tutorial Grid -->
            <div id="tutorialContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Content will be injected here -->
            </div>
            
            <div id="errorContainer" class="hidden text-center py-20">
                <h3 class="text-lg font-bold mb-4 opacity-60">Connection Lost</h3>
                <button onclick="fetchTutorials()" class="px-8 py-3 rounded-2xl bg-cyan-600 text-white font-bold text-sm active:scale-95 transition-all">Retry</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-100 dark:bg-[#060B14] py-8 text-center px-5 border-t border-slate-200 dark:border-white/5 relative z-10 mt-auto">
        <p id="footerYear" data-i18n="footerText" class="text-slate-400 text-[11px] font-medium tracking-wide"></p>
    </footer>

    <!-- Back to Top -->
    <button id="scrollToTopBtn" class="fixed bottom-6 right-5 w-11 h-11 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl shadow-xl flex items-center justify-center active:scale-90 transition-all z-40">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKbNs1rzLbh_DXW7CMB64zscJW6sfCjZXFFlYnh6aXCEP4U2qZ7hZ-VS1Xsd-mUpSl/exec'; 
        
        let globalTutorials = []; 
        let currentCategory = 'All';
        let currentLang = 'my';

        const translations = {
            en: {
                tutorialSubtitle: "Tutorials", tutorialTitle: "Video Collection",
                tutorialDesc: "Master digital tools with our curated video guides.",
                copySuccess: "Link Copied!", viewAll: "All Tutorials",
                footerText: "© {year} Digital Nest. All rights reserved."
            },
            my: {
                tutorialSubtitle: "Tutorials", tutorialTitle: "လေ့လာကြည့်ရှုရန်",
                tutorialDesc: "နည်းပညာဆိုင်ရာ လမ်းညွှန်များကို တစ်နေရာတည်းမှာ စုစည်းပေးထားပါတယ်။",
                copySuccess: "Link ကို Copy ကူးပြီးပါပြီ!", viewAll: "အားလုံးကြည့်ရန်",
                footerText: "© {year} Digital Nest. မူပိုင်ခွင့်များအားလုံးသိမ်းဆည်းထားသည်။"
            }
        };

        function getYouTubeID(url) {
            if(!url) return null;
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|shorts\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.trim().match(regExp);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        function updateContent() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerHTML = key === 'footerText' ? translations[currentLang][key].replace('{year}', new Date().getFullYear()) : translations[currentLang][key];
                }
            });
            document.getElementById('langToggleBtnMobile').innerText = currentLang === 'my' ? 'English' : 'မြန်မာ';
            if (globalTutorials.length > 0) renderCategories(globalTutorials);
        }

        function renderCategories(videos) {
            const container = document.getElementById('categoryContainer');
            const categories = new Set();
            videos.forEach(v => { if (v.category) categories.add(v.category.trim()); });
            if (categories.size === 0) return;
            document.getElementById('categorySection').classList.remove('hidden');
            const allCats = ['All', ...Array.from(categories)];
            container.innerHTML = allCats.map(cat => {
                const active = cat === currentCategory;
                const cls = active ? 'bg-slate-900 dark:bg-white text-white dark:text-slate-900' : 'bg-white/50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-white/5';
                return `<button onclick="filterTutorials('${cat}')" class="px-5 py-2 rounded-xl text-[12px] font-bold transition-all active:scale-95 whitespace-nowrap ${cls}">${(cat === 'All' && currentLang === 'my') ? 'အားလုံး' : cat}</button>`;
            }).join('');
        }

        function filterTutorials(cat) {
            currentCategory = cat;
            renderCategories(globalTutorials);
            const filtered = globalTutorials.filter(v => cat === 'All' || v.category === cat);
            document.getElementById('tutorialContainer').innerHTML = filtered.map(generateTutorialCard).join('');
        }

        function generateTutorialCard(v) {
            const title = v.title || 'Untitled';
            const link = v.video_link || '#';
            const img = v.img_url || '';
            const cat = v.category || 'Guide';
            const loc = v.locate || '';
            const share = `${window.location.origin}${window.location.pathname}?id=${encodeURIComponent(loc)}`;
            const yid = getYouTubeID(link);
            
            // Image Fallback Logic
            let finalImg = img;
            if (!finalImg || finalImg === '') {
                if (yid) {
                    finalImg = `https://img.youtube.com/vi/${yid}/maxresdefault.jpg`;
                } else {
                    finalImg = 'https://via.placeholder.com/600x400?text=Tutorial';
                }
            }

            return `
                <div class="minimal-card p-4 rounded-[1.75rem] flex flex-col h-full group">
                    <!-- Image Wrapper -->
                    <div onclick="window.open('${link}', '_blank')" class="w-full aspect-video bg-slate-900 rounded-2xl overflow-hidden relative mb-4 cursor-pointer">
                        <img src="${finalImg}" 
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                             alt="${title}" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='https://img.youtube.com/vi/${yid}/hqdefault.jpg';">
                        
                        <!-- Minimal Play Icon Overlay -->
                        <div class="absolute inset-0 flex items-center justify-center bg-black/10 opacity-100 transition-opacity">
                             <div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/20 shadow-2xl">
                                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                             </div>
                        </div>
                        
                        <!-- Category Badge -->
                        <div class="absolute top-3 left-3 px-3 py-1 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md rounded-lg text-[9px] font-bold text-red-500 dark:text-red-400 uppercase tracking-widest shadow-sm">${cat}</div>
                    </div>
                    
                    <div class="flex flex-col flex-grow">
                        <div class="flex items-start justify-between gap-3 mb-2">
                             <h3 onclick="window.open('${link}', '_blank')" class="text-[14px] font-bold text-slate-800 dark:text-slate-100 leading-snug cursor-pointer hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors line-clamp-2 flex-grow">${title}</h3>
                             <button onclick="copyShare('${share}')" class="p-1.5 text-slate-400 hover:text-cyan-500 transition-colors active:scale-90 flex-shrink-0" title="Copy Link">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                             </button>
                        </div>
                    </div>
                </div>`;
        }

        function copyShare(link) {
            const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            showToast(translations[currentLang]['copySuccess']);
        }

        function showToast(m) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div'); 
            t.className = "animate-toast-slide flex items-center gap-3 px-6 py-3.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-2xl text-xs font-bold shadow-2xl"; 
            t.innerHTML = `<span>${m}</span>`; 
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        async function fetchTutorials() {
            const container = document.getElementById('tutorialContainer');
            container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 text-xs font-bold animate-pulse">Loading...</div>`;
            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                if(!res.ok) throw new Error();
                globalTutorials = await res.json();
                
                const id = new URLSearchParams(window.location.search).get('id');
                if (id) {
                    const t = globalTutorials.find(v => v.locate === id);
                    if (t) {
                        container.innerHTML = generateTutorialCard(t);
                        document.getElementById('categorySection').classList.add('hidden');
                        container.insertAdjacentHTML('beforebegin', `<div class="mb-8"><button onclick="window.location.href=window.location.pathname" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest hover:text-cyan-500 transition-colors active:scale-95">← ${translations[currentLang]['viewAll']}</button></div>`);
                        return;
                    }
                }
                filterTutorials('All');
            } catch (e) {
                document.getElementById('errorContainer').classList.remove('hidden');
                container.innerHTML = '';
            }
        }

        document.addEventListener('DOMContentLoaded', () => { updateContent(); fetchTutorials(); });
        document.getElementById('langToggleBtnMobile').onclick = () => { currentLang = currentLang === 'my' ? 'en' : 'my'; updateContent(); };
        document.querySelectorAll('.theme-toggle').forEach(btn => btn.onclick = () => {
            const dark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', dark ? 'dark' : 'light');
            document.querySelectorAll('.sun-icon').forEach(i => i.classList.toggle('hidden', !dark));
            document.querySelectorAll('.moon-icon').forEach(i => i.classList.toggle('hidden', dark));
        });
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('glass-nav', window.scrollY > 20);
            document.getElementById('scrollToTopBtn').classList.toggle('show', window.scrollY > 400);
        });
        document.getElementById('scrollToTopBtn').onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('mobileMenuBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('hidden');
    </script>
</body>
</html>
