<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Nest - Premium Ecosystem</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
        }
        .hide { display: none !important; }
        
        /* Custom Select Style */
        select {
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;
        }

        /* Animations */
        @keyframes fadeInScale { 
            from { opacity: 0; transform: scale(0.95) translate(-50%, -50%); } 
            to { opacity: 1; transform: scale(1) translate(-50%, -50%); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-animate-center { 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: fadeInScale 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        .modal-animate-fade { animation: fadeIn 0.2s ease-out forwards; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 min-h-screen relative overflow-x-hidden">

    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <!-- Logo -->
                <div class="flex items-center gap-3 cursor-pointer" onclick="switchView('portal')">
                    <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 text-white flex items-center justify-center font-bold text-xl shadow-lg shadow-cyan-200/50">
                        <i data-lucide="layers"></i>
                    </div>
                    <div class="hidden sm:block">
                        <span class="font-extrabold text-xl tracking-tight block leading-none">DIGITAL<span class="text-cyan-500">NEST</span></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Workspace</span>
                    </div>
                </div>
                
                <!-- Nav Action -->
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="switchView('portal')" id="nav-portal" class="nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-cyan-600 bg-cyan-50 font-bold transition-all text-sm">
                        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="hidden md:inline">Portal</span>
                    </button>
                    <!-- Preview Shop Button -->
                    <button onclick="switchView('shop')" id="nav-shop" class="nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-slate-600 hover:bg-slate-100 font-bold transition-all text-sm border border-slate-200">
                        <i data-lucide="store" class="w-4 h-4"></i> <span>Preview Shop</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 bg-grid min-h-[calc(100vh-5rem)]">
        
        <!-- Loading Spinner -->
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="flex flex-col items-center gap-4">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-cyan-500 border-t-transparent shadow-lg shadow-cyan-500/20"></div>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">Syncing Data...</div>
            </div>
        </div>

        <!-- ==================== PORTAL VIEW (Admin) ==================== -->
        <div id="view-portal" class="hide max-w-5xl mx-auto space-y-6">
            <!-- Portal Header & Actions -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div>
                    <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">Portal Dashboard</h2>
                    <p class="text-slate-500 text-sm font-medium mt-1">Manage your ecosystem products & variants.</p>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                    <!-- Portal Search -->
                    <div class="relative flex-grow sm:w-64">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="portal-search-input" onkeyup="renderPortal()" placeholder="Search products..." 
                            class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-cyan-500 outline-none transition-all text-sm font-medium">
                    </div>
                    <button onclick="openFormModal()" class="bg-slate-900 hover:bg-cyan-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg hover:shadow-cyan-500/20 transition-all text-sm whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i> <span>Add New Product</span>
                    </button>
                </div>
            </div>

            <!-- Grouped List for Portal -->
            <div id="portal-list" class="grid gap-6">
                <!-- Grouped list items will be injected here -->
            </div>
        </div>

        <!-- ==================== SHOP VIEW (Client Preview) ==================== -->
        <div id="view-shop" class="hide space-y-8">
            <!-- Shop Header & Filters (Like Screenshot 1) -->
            <div class="bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-50 space-y-8">
                <div class="text-center space-y-4">
                    <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-cyan-50 text-cyan-600 text-[10px] font-extrabold tracking-widest uppercase">
                        <i data-lucide="zap" class="w-3.5 h-3.5"></i> Premium Shop
                    </div>
                    <h1 class="text-3xl sm:text-5xl font-extrabold text-slate-900 tracking-tight">
                        Discover Premium Accounts
                    </h1>
                </div>

                <!-- Search and Sort Bar -->
                <div class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto">
                    <div class="relative flex-grow">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="search-input" onkeyup="filterShop()" placeholder="Search by name, category or ID..." 
                            class="w-full pl-11 pr-4 py-3 rounded-2xl border-none bg-slate-100/80 focus:bg-slate-100 outline-none transition-all font-medium text-sm focus:ring-2 focus:ring-cyan-500/20">
                    </div>
                    <div class="sm:w-40 flex-shrink-0">
                        <select id="sort-select" onchange="filterShop()" class="w-full px-4 py-3 rounded-2xl border-none bg-slate-100/80 font-bold text-slate-600 outline-none transition-all cursor-pointer text-sm focus:ring-2 focus:ring-cyan-500/20">
                            <option value="default">Sort by</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Product Grid -->
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 sm:gap-8 max-w-[90rem] mx-auto">
                <!-- Products will be injected here -->
            </div>
        </div>

    </main>

    <!-- ==================== SHOP DETAIL MODAL (Centered like Screenshot 2) ==================== -->
    <div id="detail-modal" class="fixed inset-0 z-[110] hide">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm modal-animate-fade cursor-pointer" onclick="closeDetailModal()"></div>
        
        <!-- Centered Modal Content -->
        <div class="absolute w-[92%] sm:w-full max-w-[420px] bg-white rounded-3xl modal-animate-center shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            
            <button onclick="closeDetailModal()" class="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-800 bg-white/50 hover:bg-slate-100 rounded-full transition-colors z-10 backdrop-blur-md">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>

            <div class="overflow-y-auto no-scrollbar p-6 sm:p-8 flex flex-col gap-6" id="detail-content">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- ==================== CRUD FORM MODAL (Admin - Add completely new product) ==================== -->
    <div id="form-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hide flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-3xl w-full max-w-xl overflow-hidden shadow-2xl transform transition-all my-8">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 bg-white z-10">
                <div>
                    <h3 id="modal-title" class="text-xl font-bold text-slate-900">Add New Product</h3>
                </div>
                <button onclick="closeFormModal()" class="text-slate-400 hover:text-slate-700 p-2 rounded-full hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <datalist id="category-list"></datalist>

            <form id="crud-form" class="p-6 space-y-4" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="f-no">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Product Name</label>
                        <input type="text" id="f-name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 bg-white outline-none transition-all font-medium text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Product ID</label>
                        <input type="text" id="f-id" required placeholder="e.g. zoom001" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 bg-white outline-none transition-all font-medium text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Category</label>
                        <input type="text" id="f-category" list="category-list" required placeholder="Select or type..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 bg-white outline-none transition-all font-medium text-sm">
                    </div>
                    
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Image URL</label>
                        <input type="url" id="f-img" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 bg-white outline-none transition-all text-sm">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Description</label>
                        <textarea id="f-desc" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 bg-white outline-none transition-all text-sm"></textarea>
                    </div>
                    <div class="col-span-2" id="status-container">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Status</label>
                        <select id="f-status" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-cyan-500 bg-white outline-none transition-all text-sm font-bold">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                    <!-- Dynamic Pricing Options Section (For new product only) -->
                    <div class="col-span-2 border-t border-slate-100 pt-4 mt-2">
                        <div class="flex justify-between items-center mb-3">
                            <label class="block text-xs font-bold text-slate-800 uppercase">Pricing Options (Durations)</label>
                            <button type="button" id="add-variant-btn" onclick="addVariantRow()" class="text-xs font-bold text-cyan-600 hover:bg-cyan-50 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Option
                            </button>
                        </div>
                        <div id="variants-container" class="space-y-3">
                            <!-- Dynamic rows injected here -->
                        </div>
                    </div>
                </div>
                
                <div class="pt-6 flex gap-3 sticky bottom-0 bg-white border-t border-slate-50 mt-4">
                    <button type="button" onclick="closeFormModal()" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors text-sm">Cancel</button>
                    <button type="submit" id="submit-btn" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-white bg-cyan-500 hover:bg-cyan-600 shadow-lg shadow-cyan-500/30 transition-all flex justify-center items-center gap-2 text-sm">
                        Save Product
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyeqvqyP4Ekg6aanfPqznfwf2b7MPo04YHtsIPw5d0JcUA_c9xy-GupYjUrz8zFgFk6/exec"; 
        
        let appData = [];
        let groupedProducts = [];
        let currentShopData = []; 

        lucide.createIcons();

        // Ensure Portal is default on load
        function initApp() {
            switchView('portal');
            fetchData();
        }

        function switchView(view) {
            document.getElementById('view-shop').classList.add('hide');
            document.getElementById('view-portal').classList.add('hide');
            document.getElementById('view-' + view).classList.remove('hide');

            const btnPortal = document.getElementById('nav-portal');
            const btnShop = document.getElementById('nav-shop');

            if(view === 'portal') {
                btnPortal.className = "nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-cyan-600 bg-cyan-50 font-bold transition-all text-sm";
                btnShop.className = "nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-slate-600 hover:bg-slate-100 font-bold transition-all text-sm border border-slate-200";
                renderPortal(); // Re-render to ensure inline forms are reset
            } else {
                btnShop.className = "nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-cyan-600 bg-cyan-50 font-bold transition-all text-sm border border-cyan-100";
                btnPortal.className = "nav-btn px-4 py-2.5 rounded-xl flex items-center gap-2 text-slate-600 hover:bg-slate-100 font-bold transition-all text-sm";
            }
        }

        async function fetchData() {
            document.getElementById('loader').classList.remove('hide');
            document.getElementById('view-portal').style.display = 'none';
            document.getElementById('view-shop').style.display = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'read' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await response.json();
                if (result.status === 'success') {
                    appData = result.data;
                    processData();
                    populateCategoryList();
                    renderPortal();
                    
                    document.getElementById('search-input').value = '';
                    document.getElementById('sort-select').value = 'default';
                    currentShopData = [...groupedProducts];
                    renderShop();
                }
            } catch (error) {
                console.error(error);
                alert("Data ယူရာတွင် အမှားရှိပါသည်။");
            } finally {
                document.getElementById('loader').classList.add('hide');
                document.getElementById('view-portal').style.display = '';
                document.getElementById('view-shop').style.display = '';
            }
        }

        function processData() {
            const groups = {};
            appData.forEach(item => {
                if (!groups[item.product_id]) {
                    groups[item.product_id] = {
                        product_id: item.product_id,
                        product_name: item.product_name,
                        category: item.category,
                        img_url: item.img_url,
                        description: item.description,
                        variants: []
                    };
                }
                groups[item.product_id].variants.push({
                    no: item.no, 
                    months: item.months,
                    price: parseInt(item.price) || 0,
                    status: item.status
                });
            });

            groupedProducts = Object.values(groups).map(g => {
                g.variants.sort((a, b) => a.price - b.price);
                g.basePrice = g.variants.length > 0 ? g.variants[0].price : 0;
                return g;
            });
        }

        function populateCategoryList() {
            const datalist = document.getElementById('category-list');
            datalist.innerHTML = '';
            const categories = [...new Set(appData.map(item => item.category))].filter(Boolean);
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                datalist.appendChild(option);
            });
        }

        // ==============================================================
        // SHOP RENDER & FILTER LOGIC (Client View)
        // ==============================================================
        function filterShop() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const sortVal = document.getElementById('sort-select').value;

            currentShopData = groupedProducts.filter(group => {
                const searchStr = `${group.product_name} ${group.category} ${group.product_id}`.toLowerCase();
                return searchStr.includes(searchTerm);
            });

            if (sortVal === 'price-asc') {
                currentShopData.sort((a, b) => a.basePrice - b.basePrice);
            } else if (sortVal === 'price-desc') {
                currentShopData.sort((a, b) => b.basePrice - a.basePrice);
            }

            renderShop();
        }

        function renderShop() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            const activeProducts = currentShopData.filter(p => p.variants.some(v => v.status === 'active'));

            if(activeProducts.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-400 font-medium bg-white rounded-3xl border border-slate-100">ရှာဖွေမှုရလဒ် မတွေ့ရှိပါ။</div>`;
                return;
            }

            activeProducts.forEach(product => {
                const activeVariants = product.variants.filter(v => v.status === 'active');
                if(activeVariants.length === 0) return;

                const basePrice = activeVariants[0].price;

                const card = document.createElement('div');
                // Clean Minimal Card matching Screenshot 1
                card.className = "bg-white rounded-3xl p-5 shadow-[0_4px_16px_rgba(0,0,0,0.03)] border border-slate-100 hover:border-cyan-100 hover:shadow-xl hover:shadow-cyan-100/50 hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col gap-4 group";
                card.onclick = () => openDetailModal(product.product_id);
                
                card.innerHTML = `
                    <div class="flex justify-start">
                        <span class="inline-flex px-2.5 py-1 bg-slate-50 text-slate-500 text-[9px] font-extrabold rounded-md uppercase tracking-wider border border-slate-100">
                            ${product.category}
                        </span>
                    </div>
                    
                    <div class="flex-grow flex items-center justify-center p-2 h-32">
                        <img src="${product.img_url}" alt="${product.product_name}" class="max-w-[70%] max-h-full object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-sm" onerror="this.src='https://placehold.co/400?text=No+Image'">
                    </div>
                    
                    <div class="pt-2 flex flex-col border-t border-slate-50 mt-auto">
                        <h3 class="text-[15px] font-bold text-slate-900 mb-2 leading-snug line-clamp-2">${product.product_name}</h3>
                        <div class="flex items-baseline gap-1.5 mt-auto">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">From</span>
                            <span class="text-xl font-extrabold text-cyan-600">${basePrice.toLocaleString()} <span class="text-[10px] text-slate-500 font-bold ml-0.5">Ks</span></span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ==============================================================
        // SHOP DETAIL MODAL LOGIC (Matching Screenshot 2)
        // ==============================================================
        function openDetailModal(productId) {
            const product = groupedProducts.find(p => p.product_id === productId);
            if(!product) return;

            const activeVariants = product.variants.filter(v => v.status === 'active');
            
            let optionsHtml = activeVariants.map((v, i) => `
                <label class="relative flex items-center justify-between p-3.5 sm:p-4 rounded-xl border ${i===0 ? 'border-cyan-500 ring-1 ring-cyan-500 bg-cyan-50/20' : 'border-slate-200 hover:border-cyan-300 hover:bg-slate-50'} cursor-pointer transition-all" onclick="selectVariant(this, ${v.price})">
                    <input type="radio" name="variant" class="hidden" ${i===0 ? 'checked' : ''}>
                    <span class="font-bold text-sm text-slate-800">${v.months}</span>
                    <span class="font-extrabold text-cyan-600 text-sm">${v.price.toLocaleString()} Ks</span>
                </label>
            `).join('');

            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <!-- Header (Icon & Title) -->
                <div class="flex gap-4 items-center mb-1">
                    <div class="w-[72px] h-[72px] rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center p-2 flex-shrink-0">
                        <img src="${product.img_url}" class="w-full h-full object-contain" onerror="this.style.display='none'">
                    </div>
                    <div>
                        <span class="inline-block px-2.5 py-1 bg-slate-100 text-slate-500 text-[9px] font-extrabold rounded-md uppercase tracking-wider mb-1.5">${product.category}</span>
                        <h2 class="text-lg sm:text-xl font-extrabold text-slate-900 leading-tight">${product.product_name}</h2>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Description</h4>
                    <div class="text-xs text-slate-600 leading-relaxed font-medium bg-slate-50 p-4 rounded-2xl border border-slate-100 max-h-32 overflow-y-auto no-scrollbar">
                        ${product.description || 'No description available.'}
                    </div>
                </div>

                <!-- Variants Selection -->
                <div class="space-y-2.5">
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Select Duration</h4>
                    <div class="grid gap-2">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer (Total Price & Button) -->
                <div class="pt-2 mt-2 flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Total Price</p>
                        <div class="text-xl font-extrabold text-slate-900" id="detail-price">${activeVariants[0].price.toLocaleString()} <span class="text-xs text-slate-500 font-bold">Ks</span></div>
                    </div>
                    <button class="bg-cyan-500 hover:bg-cyan-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-cyan-500/30 transition-all flex items-center gap-2 text-sm" onclick="alert('Proceed to buy feature...')">
                        <i data-lucide="shopping-bag" class="w-4 h-4"></i> Get Now
                    </button>
                </div>
            `;
            
            document.getElementById('detail-modal').classList.remove('hide');
            lucide.createIcons();
        }

        function selectVariant(element, price) {
            const labels = element.parentElement.querySelectorAll('label');
            labels.forEach(l => {
                l.className = "relative flex items-center justify-between p-3.5 sm:p-4 rounded-xl border border-slate-200 hover:border-cyan-300 hover:bg-slate-50 cursor-pointer transition-all";
            });
            element.className = "relative flex items-center justify-between p-3.5 sm:p-4 rounded-xl border border-cyan-500 ring-1 ring-cyan-500 bg-cyan-50/20 cursor-pointer transition-all";
            element.querySelector('input').checked = true;
            document.getElementById('detail-price').innerHTML = `${price.toLocaleString()} <span class="text-xs text-slate-500 font-bold">Ks</span>`;
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hide');
        }

        // ==============================================================
        // GROUPED PORTAL RENDER LOGIC & INLINE ADD (Admin View)
        // ==============================================================
        function renderPortal() {
            const list = document.getElementById('portal-list');
            list.innerHTML = '';
            
            const searchTerm = document.getElementById('portal-search-input')?.value.toLowerCase() || '';

            // Filter Portal Data
            let filteredPortalData = groupedProducts.filter(group => {
                const searchStr = `${group.product_name} ${group.category} ${group.product_id}`.toLowerCase();
                return searchStr.includes(searchTerm);
            });

            if(filteredPortalData.length === 0) {
                list.innerHTML = `<div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300 text-slate-400 font-medium flex flex-col items-center justify-center gap-4">
                    <i data-lucide="package-open" class="w-12 h-12 text-slate-200"></i>
                    Data မတွေ့ရှိပါ။ Product အသစ်စတင်ထည့်သွင်းပါ။
                </div>`;
                lucide.createIcons();
                return;
            }

            filteredPortalData.forEach(group => {
                const el = document.createElement('div');
                // Structure matching Screenshot 3
                el.className = "bg-white p-5 sm:p-7 rounded-3xl shadow-sm border border-slate-100 flex flex-col gap-5";
                
                let variantsHtml = group.variants.map(v => `
                    <div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-2xl border border-slate-100 hover:border-slate-200 transition-colors">
                        <div class="flex items-center gap-4 w-1/3">
                            <span class="bg-white border border-slate-200 text-slate-700 text-sm font-bold px-4 py-1.5 rounded-lg shadow-sm w-24 text-center">${v.months}</span>
                            <span class="text-[10px] font-extrabold ${v.status === 'active' ? 'text-green-500' : 'text-slate-400'} uppercase tracking-widest hidden sm:block">${v.status}</span>
                        </div>
                        <div class="flex items-center justify-end w-2/3 gap-6">
                            <div class="font-extrabold text-slate-900 text-lg">${v.price.toLocaleString()} <span class="text-[10px] text-slate-500 font-bold ml-0.5">Ks</span></div>
                            <div class="flex items-center gap-1 border-l border-slate-200 pl-4">
                                <button onclick='openEditVariantModal(${JSON.stringify(group).replace(/'/g, "&#39;")}, ${v.no})' class="p-2 text-slate-400 hover:text-cyan-600 rounded-xl transition-all" title="Edit Option">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </button>
                                <button onclick='handleDeleteVariant(${v.no})' class="p-2 text-slate-400 hover:text-red-500 rounded-xl transition-all" title="Delete Option">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-2 border-b border-slate-50">
                        <div class="flex items-center gap-4">
                            <div class="h-14 w-14 sm:h-16 sm:w-16 rounded-2xl bg-slate-50 border border-slate-100 flex-shrink-0 flex items-center justify-center p-2">
                                <img src="${group.img_url}" class="w-full h-full object-contain" onerror="this.style.display='none'">
                            </div>
                            <div>
                                <h4 class="font-extrabold text-slate-900 text-lg sm:text-xl tracking-tight leading-tight">${group.product_name}</h4>
                                <div class="flex items-center gap-2 mt-1.5">
                                    <span class="bg-slate-800 text-white text-[9px] font-extrabold px-2 py-0.5 rounded uppercase tracking-widest">${group.product_id}</span>
                                    <span class="bg-slate-100 text-slate-500 text-[9px] font-extrabold px-2 py-0.5 rounded uppercase tracking-widest">${group.category}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex gap-2.5 w-full sm:w-auto">
                            <!-- Inline Add Option Toggle -->
                            <button onclick="toggleInlineAdd('${group.product_id}')" class="flex-1 sm:flex-none text-xs font-bold text-cyan-600 bg-cyan-50/50 hover:bg-cyan-50 border border-cyan-100 px-4 py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Option
                            </button>
                            <button onclick="handleDeleteProduct('${group.product_id}')" class="flex-1 sm:flex-none text-xs font-bold text-red-500 hover:text-white bg-red-50/50 hover:bg-red-500 border border-red-100 hover:border-red-500 px-4 py-2.5 rounded-xl transition-all flex items-center justify-center gap-2">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">Delete All</span>
                            </button>
                        </div>
                    </div>

                    <!-- Inline Add Form (Hidden by default) -->
                    <div id="inline-form-${group.product_id}" class="hidden bg-cyan-50/30 p-4 rounded-2xl border border-cyan-100 mt-1 mb-2">
                        <div class="flex flex-col sm:flex-row items-center gap-3">
                            <input type="text" id="in-month-${group.product_id}" placeholder="Duration (e.g. 1 months)" class="w-full sm:w-1/3 px-3 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-cyan-500 text-sm font-medium">
                            <input type="number" id="in-price-${group.product_id}" placeholder="Price (Ks)" class="w-full sm:w-1/3 px-3 py-2.5 rounded-xl border border-slate-200 outline-none focus:border-cyan-500 text-sm font-medium">
                            <select id="in-status-${group.product_id}" class="w-full sm:w-auto px-3 py-2.5 rounded-xl border border-slate-200 outline-none text-sm font-bold bg-white text-slate-600 cursor-pointer">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                            <div class="flex gap-2 w-full sm:w-auto ml-auto">
                                <button onclick="toggleInlineAdd('${group.product_id}')" class="px-4 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-500 text-sm font-bold hover:bg-slate-50">Cancel</button>
                                <button id="btn-save-in-${group.product_id}" onclick="saveInlineVariant('${group.product_id}')" class="px-5 py-2.5 rounded-xl bg-cyan-500 text-white text-sm font-bold shadow-md hover:bg-cyan-600 transition-colors w-24">Save</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Variants List -->
                    <div class="flex flex-col gap-2.5">
                        ${variantsHtml}
                    </div>
                `;
                list.appendChild(el);
            });
            lucide.createIcons();
        }

        // --- Inline Add Form Logic ---
        function toggleInlineAdd(productId) {
            const form = document.getElementById(`inline-form-${productId}`);
            if(form.classList.contains('hidden')) {
                form.classList.remove('hidden');
                document.getElementById(`in-month-${productId}`).focus();
            } else {
                form.classList.add('hidden');
                // Clear inputs
                document.getElementById(`in-month-${productId}`).value = '';
                document.getElementById(`in-price-${productId}`).value = '';
            }
        }

        async function saveInlineVariant(productId) {
            const monthInput = document.getElementById(`in-month-${productId}`).value;
            const priceInput = document.getElementById(`in-price-${productId}`).value;
            const statusInput = document.getElementById(`in-status-${productId}`).value;

            if(!monthInput || !priceInput) {
                alert("Duration နှင့် Price အားလုံးဖြည့်ပါ။");
                return;
            }

            const group = groupedProducts.find(g => g.product_id === productId);
            if(!group) return;

            const btn = document.getElementById(`btn-save-in-${productId}`);
            const ogText = btn.innerText;
            btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent mx-auto"></div>`;
            btn.disabled = true;

            const payload = {
                action: 'create',
                product_name: group.product_name,
                product_id: group.product_id,
                category: group.category,
                months: monthInput,
                price: priceInput,
                img_url: group.img_url,
                description: group.description,
                status: statusInput
            };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                await fetchData(); // Re-fetch all data to update list
            } catch (err) {
                alert("ချိတ်ဆက်မှု အမှားရှိပါသည်။");
                btn.innerHTML = ogText;
                btn.disabled = false;
            }
        }

        // ==============================================================
        // CRUD MODAL LOGIC (For New Products & Editing)
        // ==============================================================
        window.addVariantRow = function(month = '', price = '') {
            const container = document.getElementById('variants-container');
            const row = document.createElement('div');
            row.className = 'variant-row flex gap-3 items-center';
            row.innerHTML = `
                <div class="flex-1">
                    <input type="text" placeholder="Duration (e.g. 1 Month)" value="${month}" required class="v-month w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:border-cyan-500 outline-none transition-all text-sm font-medium">
                </div>
                <div class="flex-1">
                    <input type="number" placeholder="Price (MMK)" value="${price}" required class="v-price w-full px-3 py-2.5 rounded-xl border border-slate-200 focus:border-cyan-500 outline-none transition-all text-sm font-medium">
                </div>
                <button type="button" onclick="this.parentElement.remove(); updateRemoveButtons();" class="remove-variant-btn p-2.5 text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-xl transition-colors">
                    <i data-lucide="minus" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(row);
            lucide.createIcons();
            updateRemoveButtons();
        }

        window.updateRemoveButtons = function() {
            const rows = document.querySelectorAll('.variant-row');
            const btns = document.querySelectorAll('.remove-variant-btn');
            btns.forEach(btn => {
                btn.style.display = rows.length > 1 ? 'block' : 'none';
            });
        }

        // Open Modal to create a completely new product
        window.openFormModal = function() {
            document.getElementById('form-modal').classList.remove('hide');
            document.getElementById('variants-container').innerHTML = ''; 
            document.getElementById('modal-title').innerText = "Add New Product";
            document.getElementById('crud-form').reset();
            document.getElementById('f-no').value = '';
            document.getElementById('status-container').classList.remove('hide');
            
            // Show Add Option button
            document.getElementById('add-variant-btn').style.display = 'flex';
            addVariantRow('', ''); 
        }

        // Open Modal specifically to edit an existing variant
        window.openEditVariantModal = function(group, variantNo) {
            const variant = group.variants.find(v => v.no === variantNo);
            if(!variant) return;

            document.getElementById('form-modal').classList.remove('hide');
            document.getElementById('variants-container').innerHTML = ''; 
            document.getElementById('modal-title').innerText = "Edit Option Details";
            
            document.getElementById('f-no').value = variant.no; 
            document.getElementById('f-name').value = group.product_name;
            document.getElementById('f-id').value = group.product_id;
            document.getElementById('f-category').value = group.category;
            document.getElementById('f-img').value = group.img_url;
            document.getElementById('f-desc').value = group.description;
            document.getElementById('status-container').classList.remove('hide');
            document.getElementById('f-status').value = variant.status;
            
            // Hide "Add Option" since we are strictly editing ONE row
            document.getElementById('add-variant-btn').style.display = 'none'; 
            addVariantRow(variant.months, variant.price);
        }

        window.closeFormModal = function() {
            document.getElementById('form-modal').classList.add('hide');
        }

        window.handleFormSubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalBtnHtml = btn.innerHTML;
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-2 border-white border-t-transparent"></div> Saving...`;
            btn.disabled = true;

            const no = document.getElementById('f-no').value;
            const variants = document.querySelectorAll('.variant-row');
            
            try {
                if (no) { // Update existing
                    const payload = {
                        action: 'update', no: no,
                        product_name: document.getElementById('f-name').value,
                        product_id: document.getElementById('f-id').value,
                        category: document.getElementById('f-category').value,
                        months: variants[0].querySelector('.v-month').value,
                        price: variants[0].querySelector('.v-price').value,
                        img_url: document.getElementById('f-img').value,
                        description: document.getElementById('f-desc').value,
                        status: document.getElementById('f-status').value
                    };
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                } else { // Create new
                    for (const row of Array.from(variants)) {
                        const payload = {
                            action: 'create',
                            product_name: document.getElementById('f-name').value,
                            product_id: document.getElementById('f-id').value,
                            category: document.getElementById('f-category').value,
                            months: row.querySelector('.v-month').value,
                            price: row.querySelector('.v-price').value,
                            img_url: document.getElementById('f-img').value,
                            description: document.getElementById('f-desc').value,
                            status: document.getElementById('f-status').value
                        };
                        await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    }
                }
                closeFormModal();
                await fetchData(); 
            } catch (err) {
                alert("ချိတ်ဆက်မှု အမှားရှိပါသည်။");
            } finally {
                btn.innerHTML = originalBtnHtml;
                btn.disabled = false;
            }
        }

        window.handleDeleteVariant = async function(no) {
            if(!confirm("ဒီ Option ကို တကယ်ဖျက်မှာ သေချာလား?")) return;
            try {
                document.getElementById('loader').classList.remove('hide');
                document.getElementById('view-portal').style.display = 'none';
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', no: no }) });
                await fetchData();
            } catch (err) {
                alert("ဖျက်ရာတွင် အမှားရှိပါသည်။");
                fetchData();
            }
        }

        window.handleDeleteProduct = async function(productId) {
            if(!confirm("ဒီ Product တစ်ခုလုံး (Options အားလုံး) ကို ဖျက်မှာ သေချာလား?")) return;
            try {
                document.getElementById('loader').classList.remove('hide');
                document.getElementById('view-portal').style.display = 'none';
                const group = groupedProducts.find(g => g.product_id === productId);
                const nosToDelete = group.variants.map(v => v.no).sort((a, b) => b - a);

                for (const no of nosToDelete) {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', no: no }) });
                }
                await fetchData();
            } catch (err) {
                alert("ဖျက်ရာတွင် အမှားရှိပါသည်။");
                fetchData();
            }
        }

        initApp();

    </script>
</body>
</html>
